term=xterm-256color

font=Mx437 IBM VGA 8x16:size=12
font-bold=Mx437 IBM VGA 8x16:size=12
font-italic=Mx437 IBM VGA 8x16:size=12
font-bold-italic=Mx437 IBM VGA 8x16:size=12
bold-text-in-bright=yes

[bell]
system=no
urgent=no
notify=no
visual=no

[scrollback]
lines=4000
indicator-position=none

[cursor]
style=underline
blink=yes
underline-thickness=1
unfocused-style=unchanged

[mouse]
hide-when-typing=yes

[colors-dark]
background=282828
foreground=ebdbb2

regular0=282828 # black
regular1=cc241d # red
regular2=98971a # green
regular3=d79921 # yellow
regular4=458588 # blue
regular5=b16286 # magenta
regular6=689d6a # cyan
regular7=a89984 # white

bright0=928374 # bright black
bright1=fb4934 # bright red
bright2=b8bb26 # bright green
bright3=fabd2f # bright yellow
bright4=83a598 # bright blue
bright5=d3869b # bright magenta
bright6=8ec07c # bright cyan
bright7=ebdbb2 # bright white

[key-bindings]
show-urls-launch=Control+Shift+o
scrollback-home=Control+Shift+Home Shift+Home
scrollback-end=Control+Shift+End Shift+End
scrollback-up-page=Control+Shift+Page_Up Shift+Page_Up
scrollback-down-page=Control+Shift+Page_Down Shift+Page_Down
scrollback-up-line=Control+Shift+k
scrollback-down-line=Control+Shift+j


[url-bindings]
cancel=Control+g Control+c Control+d Escape
